<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Portal</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: skyblue;
        font-weight: 400;
    }

    main {
        background-color: skyblue;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
    }
    
    .form-container {
        background-color: #0f172a;
        color: white;
        width: 90%;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
    }
    
    form {
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    
    .div-btn {
        width: 100%;
    }

    .input-user-pass {
        width: 100%;
        height: 50px;
        border-radius: 25px;
        padding: 15px;
        border: none;
        outline: none;
        font-size: 16px;
        font-weight: 400;
    }
    
    .login-btn {
        background-color: #00f4ff;
        width: 100%;
        height: 50px;
        border-radius: 25px;
        border: none;
        box-shadow: 0 0 15px 6px #00f4ff;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
        transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    
    .login-btn:hover {
        background-color: #00f4ff;
        transform: scale(1.05);
        box-shadow: 0 0 25px 6px #00f4ff;
    }
    
    .remember-forgot {
        width: 100%; 
        display: flex;
        justify-content: space-between;
        margin-top: -5px;
        margin-bottom: 15px;
        font-size: 14px;
    }
    
    label {
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }
    
    a {
        color: white;
        text-decoration: none;
        cursor: pointer;
    }
    
    a:hover {
        text-decoration: underline;
    }
    
    .Register {
        width: 100%;
        font-size: 12px;
    }

    @media (min-width: 576px) {
        body {
            font-size: 24px;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .input-user-pass {
            width: 100%;
            height: 60px;
            padding: 18px;
            margin: 5px 0;
            font-size: 18px;
            font-weight: 500;
        }
        
        .remember-forgot {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
            width: 100%;
        }
        
        .login-btn {
            width: 100%;
            height: 60px;
            font-size: 18px;
        }
        
        .Register {
            width: 100%;
            font-size: 14px;
            padding: 5px;
        }
        
        label {
            font-size: 14px;
        }
        
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
    }
    </style>
</head>
<body>
    <main>
    <div class="form-container">
        <form>
            <h1>Login</h1>
            <div class="div-btn">
                <input type="text" id="name" name="name" placeholder="Username" class="input-user-pass">
            </div>
            <div class="div-btn">
                <input type="password" id="password" name="password" placeholder="Password" class="input-user-pass">
            </div>
            <div class="remember-forgot">
               <label><input type="checkbox" class="remember">Remember me</label>
               <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <p class="Register">Don't have an account? <a href="#" class="Register">Register</a></p>
        </form>
    </div>
    </main>
</body>
</html>

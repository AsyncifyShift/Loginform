<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Portal</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: skyblue;
    font-weight: 400;
}

    main {
        background-color: skyblue;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
    }
    
    .form-container {
        background-color: #0f172a;
        color: white;
        width: 90%;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
    }
    
    form {
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    
    .input-user-pass {
        width: 100%;
        height: 50px;
        border-radius: 25px;
        padding: 15px;
        border: none;
        outline: none;
        font-size: 16px;
        font-weight: 400;
        cursor: pointer;
    }
    
    .div-btn {
        width: 100%;
    }
    
    .login-btn {
        background-color: #00f4ff;
        width: 100%;
        height: 50px;
        border-radius:25px ;
        border: none;
        box-shadow:0 0 15px 6px #00f4ff ;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
        transition:
        background-color 0.3s ,
        transform 0.3s,
        box-shadow 0.3s ;
    }
    
    .login-btn:hover {
        background-color: #00f4ff;
        transform: scale(1.05);
        box-shadow: 0 0 25px 6px #00f4ff;
    }
    
    .remember-forgot {
        width: 90%;
        display: flex;
        justify-content: space-between;
        margin-top: -10px;
        margin-bottom: 15px;
        font-size: 14px;
    }
    
    label {
        font-size: 14px;
        margin-top: -3px;
        display: flex;
        align-items: center;
    }
    
    a {

        color: white;
        text-decoration: none;
        cursor:pointer;
    }
    
    a:hover {
        text-decoration: underline;
    }
    
    .Register {
        width: 90%;
        font-size: 12px;
        margin-top: -5px;
    }
    
    </style>
</head>
<body>
    <main>
    <div class="form-container">
        <form>
            <h1>Login</h1>
                <div class="div-btn">
                    <input type="name" id="name" name="name" placeholder="Username" class="input-user-pass">
                </div>
                <div class="div-btn">
                    <input type="password" id="password" name="password" placeholder="Password" class="input-user-pass">
                </div>
                <div class="remember-forgot">
                   <label><input type="checkbox" class="remember">Remember me</label>
                   <a href="#">Forgot Password?</a>
                </div>
                <button  class="login-btn">Login</button>
                <p class="Register">Don't have an account?<a href="#" class="Register">Register</a></p>
        </form>
    </div>
    </main>
</body>
</html>
